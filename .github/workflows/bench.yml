name: bench

on:
  push:
    branches:
      - main
    paths:
      - 'packages/evlog/src/**'
      - 'packages/evlog/bench/**'
      - 'packages/evlog/tsdown.config.ts'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/evlog/src/**'
      - 'packages/evlog/bench/**'
      - 'packages/evlog/tsdown.config.ts'
      - 'packages/evlog/vitest.config.ts'

jobs:
  # On push to main: update baseline files in the repo
  update-baseline:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Build evlog package
        run: bunx turbo run build --filter=evlog

      - name: Run benchmarks
        working-directory: packages/evlog
        run: bun run bench

      - name: Measure bundle size
        working-directory: packages/evlog
        run: bun bench/size.ts --json > bench/baseline/size.json

      - name: Update baseline
        working-directory: packages/evlog
        run: cp bench/results.json bench/baseline/bench.json

      - name: Commit baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/evlog/bench/baseline/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
          else
            git commit -m "chore(bench): update baseline [skip ci]"
            git push
          fi

  # On PR: compare against committed baseline
  compare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Build evlog package
        run: bunx turbo run build --filter=evlog

      - name: Measure bundle size
        working-directory: packages/evlog
        run: bun bench/size.ts --json > /tmp/size-current.json

      - name: Run benchmarks
        working-directory: packages/evlog
        run: bun run bench

      - name: Get baseline from main
        run: |
          git show origin/main:packages/evlog/bench/baseline/bench.json > /tmp/bench-baseline.json 2>/dev/null || echo '{"files":[]}' > /tmp/bench-baseline.json
          git show origin/main:packages/evlog/bench/baseline/size.json > /tmp/size-baseline.json 2>/dev/null || echo '{"entries":[],"total":{"raw":0,"gzip":0}}' > /tmp/size-baseline.json

      - name: Compare results
        id: compare
        working-directory: packages/evlog
        run: |
          set +e
          REPORT=$(bun bench/compare.ts \
            --bench /tmp/bench-baseline.json bench/results.json \
            --size /tmp/size-baseline.json /tmp/size-current.json)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "report<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$REPORT" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.compare.outputs.report }}`;
            const marker = '<!-- evlog-bench -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
